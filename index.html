<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Chargeverse">
    <meta name="theme-color" content="#cc1b18" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="assets/site.webmanifest">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chargeverse - Homepage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-bar">
    <img src="assets/The Chargeverse Logo.png" alt="The Chargeverse" width="150" height="auto">
<div class="controls">

            <button class="icon-btn" id="themeBtn" aria-label="Toggle Dark/Light Mode">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <img src="assets/The Chargeverse Logo.png" alt="The Chargeverse" width="300" height="auto">
            <p>Chargeverse - WIP</p>
        </section>

        <nav class="button-grid">
            <a href="content/premodern/premodern-list.html" class="nav-button">Pre-Modern Stories</a>
            <a href="#" class="nav-button">Modern Stories</a>
            <a href="#" class="nav-button">Future Stories</a>
            <a href="#" class="nav-button">Additional Documents</a>
            <a href="#" class="nav-button">Archived and Other Stories</a>
            <a href="content/about.html" class="nav-button">About</a>
        </nav>
    </main>
    
    <script>

        // --- Theme Toggle Logic ---
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        
        // Check system preference
        const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");

        // Function to set theme
        function setTheme(isDark) {
            if (isDark) {
                document.body.setAttribute('data-theme', 'dark');
                themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'; // Sun icon
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'; // Moon icon
            }
        }

        // Initialize based on saved preference or system default
        const currentTheme = localStorage.getItem("theme");
        if (currentTheme == "dark") {
            setTheme(true);
        } else if (currentTheme == "light") {
            setTheme(false);
        } else {
            setTheme(prefersDarkScheme.matches);
        }

        // Toggle on button click
        themeBtn.addEventListener("click", () => {
            let isDark = document.body.getAttribute('data-theme') === 'dark';
            setTheme(!isDark);
            localStorage.setItem("theme", !isDark ? "dark" : "light");
        });
    </script>
</body>
</html>
